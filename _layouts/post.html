---
layout: default
---
<article class="post">
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-meta">
    {{ page.date | date: "%B %-d, %Y" }}
    {% if page.tags and page.tags != empty %} &middot; {{ page.tags | join: ", " }}{% endif %}
  </p>
  <div class="post-content">
    {{ content }}
  </div>
  <p class="back"><a href="{{ '/blog/' | relative_url }}">&larr; All posts</a></p>
</article>
